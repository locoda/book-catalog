# 受控主题词表 v3（机器可读单一来源）
# - 每条：slug（主题页 URL，冻结不改）/ name（显示名）/ desc（一句话释义）
# - 规则见 docs/CATALOGING.md §6；schema（src/lib/subjects.ts → content.config.ts）
#   与 scripts/validate.mjs 都从本文件读取，词表外主题词会阻断构建。
# - 变更须经馆长批准：在此增删改，并在 CATALOGING.md §8 版本记录里记一行。
- slug: unnamed
  name: 悬而未名
  desc: 拒绝归类的关系：友达以上，恋人未满，或无从命名。
- slug: embers
  name: 余烬未冷
  desc: 爱熄灭之后——失恋、离散、旧情残温。
- slug: alone-together
  name: 并肩而孤
  desc: 亲密关系内部的孤独：同床异梦，相对无言。
- slug: flutter
  name: 心动症候
  desc: 心动与热恋进行时：暧昧、试探、坠入。
- slug: old-haunts
  name: 故地重游
