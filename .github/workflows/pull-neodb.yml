name: pull-neodb

on:
  # schedule:
  #   - cron: '23 21 * * 1'   # 每周二 05:23 北京时间（UTC 周一 21:23）
  workflow_dispatch:         # 也可以随时手动跑

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Import from NeoDB → draft
        env:
          NEODB_TOKEN: ${{ secrets.NEODB_TOKEN }}
        run: node scripts/import_neodb.mjs   # 已读 → drafts/（在读不入目录）

      - name: List drafts for review
        run: node scripts/promote.mjs --list

      - name: Commit & push drafts
        run: |
          git config user.name "catalog-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/works-draft
          if git diff --cached --quiet; then
            echo "No new marks."
          else
            git commit -m "chore: auto-import drafts from NeoDB ($(date -u +%F))"
            git push
          fi
